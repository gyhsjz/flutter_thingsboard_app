plugins {
    id 'com.android.application'
    id 'kotlin-android'
    id 'dev.flutter.flutter-gradle-plugin'
    // id 'com.google.gms.google-services' // Keep commented if you don't have a real google-services.json
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}
def getDartDefineValue = { key ->
    def dartDefines = [:]
    if (project.hasProperty('dart-defines')) {
        dartDefines = project.property('dart-defines')
            .split(',')
            .collectEntries { entry ->
                def pair = new String(entry.decodeBase64(), 'UTF-8').split('=')
                [(pair.first()): pair.last()]
            }
    }
    return dartDefines[key]
}
def flutterVersionCode = '1'
def flutterVersionName = '1.0'
def customScheme = 'org.thingsboard.app.auth'
def customLabel = 'Electric Machinery'
def appLinksUrlHost = 'demo.thingsboard.io'
def webPathPrefix = '/api/noauth/qr'
def appLinksUrlScheme = 'https'
android {
namespace "org.thingsboard.app"
    compileSdkVersion 35
    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "org.thingsboard.app"
        minSdkVersion 24
        targetSdkVersion 36
        versionCode 1
        versionName "1.0"
        manifestPlaceholders = [
    authScheme: customScheme,
    appLabel: customLabel,
    appLinksUrlHost: appLinksUrlHost,
    webPathPrefix: webPathPrefix,
    appLinksUrlScheme: appLinksUrlScheme
]
    }
compileOptions {
        coreLibraryDesugaringEnabled true 
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
            // Custom proguard rules
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'

        }
    }

    dependencies {
        implementation 'androidx.browser:browser:1.0.0'
        coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
        implementation 'androidx.window:window:1.0.0'
        implementation 'androidx.window:window-java:1.0.0'
    }
    android.applicationVariants.all { variant ->
    variant.outputs.all { output ->
        def builtType = variant.buildType.name
        def versionName = variant.versionName
        def versionCode = variant.versionCode

        outputFileName = "${customLabel}-${builtType}-${versionName}+${versionCode}.apk"
    }
}
}

flutter {
    source '../..'
}
